language: zh

hive-mind:
  enabled: true
  sensor-range: 32
  memory-duration: 0.25

zombie-ai:
  override:
    mode: hybrid
  break-speed: 1.0
  build-speed: 1.0
  noise-threshold: 10
  terrain-modification-enabled: true
  targeting:
    scan-cooldown-ms: 300
    switch-score-delta: 0.14
    max-range: 56.0
  build-blocks:
    - COBBLESTONE
    - DIRT
    - OAK_PLANKS
    - NETHERRACK
  build-duration: 20

  cooperation:
    retreat-health-threshold: 0.35
    regroup-distance: 14.0
    ally-disadvantage-threshold: 2
    breach-support-cooldown-ms: 3000
    focus-fire-range: 22.0
    flank-sync-range: 16.0
    bodyguard-scan-range: 20.0
    encircle-range: 22.0
    encircle-replan-ms: 700
    breach-arrive-radius: 3.6

  pathing:
    formation-slot-spacing: 1.6
    formation-replan-threshold: 1.2
    separation-weight: 0.6
    separation-range: 2.2

  builder:
    place-cooldown-ms: 850
    place-cooldown-ms-lv9: 220
    place-cooldown-ms-lv12: 180
    breach-request-after-ms: 3000
    max-build-fail-ticks: 40
    temporary-block-duration-ms: 120000
    temporary-block-decay-window-ms: 30000
    temporary-block-decay-particle-interval-ticks: 10
    temporary-block-persistence-enabled: true
    temporary-block-save-interval-ticks: 200
    place-particle-count: 16
    break-hit-effect-interval-ms: 180
    break-hit-particle-count: 8
    break-finish-particle-count: 26
  breaker:
    blacklist:
      - BEDROCK
      - BARRIER
      - END_PORTAL
      - END_PORTAL_FRAME
      - COMMAND_BLOCK
      - CHAIN_COMMAND_BLOCK
      - REPEATING_COMMAND_BLOCK
      - STRUCTURE_BLOCK
      - STRUCTURE_VOID
      - JIGSAW
      - BEACON
      - RESPAWN_ANCHOR
    whitelist: []

zombie-roles:
  miner: 0.1
  builder: 0.3
  archer: 0.1
  ender: 0.25
  nurse: 0.05
  rusher: 0.05
  suicide: 0.05

spawn:
  max-zombies-per-chunk: 24
  mspt-threshold: 45
  algorithm:
    enabled: true
    chunk-cooldown-ms: 3000
    max-global-zombies: 900
    max-near-player: 40
    spawn-budget-per-player: 2
    accept-chance: 0.6
    enforce-night-only: true

level:
  max: 12
  threat:
    xp-weight: 0.22
    survival-days-weight: 0.18
    armor-weight: 0.24
    weapon-weight: 0.36
    damage-weight: 0.20
    kdr-weight: 0.16
  encounter:
    self-weight: 0.60
    nearby-max-weight: 0.40
    nearby-avg-weight: 0.15
    nearby-radius: 64.0
  hysteresis:
    up-threshold: 0.55
    down-threshold: 0.75

breach:
  lease-ms: 4000
  role-caps:
    primary: 2
    support: 4
    bodyguard: 3
  assignment:
    primary-distance-bias: 0.85
    support-distance-bias: 1.0
    bodyguard-distance-bias: 1.1

blood-moon:
  chance: 0.02
  multiplier: 1.8
  health-multiplier: 2.0

phantom:
  max-per-player: 20
  spawn-radius: 50
  spawn-chance: 0.1
  explode-chance: 0.04
  break-block-chance: 0.3
  attack-effect-chance: 0.1
