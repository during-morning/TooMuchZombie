name: TooMuchZombies
version: 2.9.9
main: com.frigidora.toomuchzombies.TooMuchZombies
api-version: 1.21
authors: [Frigidora]
description: Advanced Zombie AI and Mechanics Plugin
commands:
  za:
    description: TooMuchZombies 插件主命令
    usage: |
      用法: /za <子命令> [参数]
      子命令列表:
      - spawn <角色>: 生成指定类型的特殊僵尸 (角色: NORMAL, MINER, BUILDER, ARCHER, ENDER, NURSE, RUSHER, SUICIDE)
      - info: 显示插件运行统计信息 (僵尸数量、平均等级等)
      - killall: 清除当前世界所有由插件生成的特殊僵尸
      - forcebloodmoon: 强制开启血月事件
      - forcechaos: 强制开启混沌模式
      - reload: 重新加载 config.yml 和 messages_*.yml
      - level set <玩家> <等级>: 设置玩家的危险等级
      - level info [玩家]: 查询自己或他人的危险等级
    permission: toomuchzombies.admin
    aliases: [tmz, toomuchzombies]
permissions:
  toomuchzombies.admin:
    description: 允许使用 TooMuchZombies 的所有管理命令
    default: op
    children:
      toomuchzombies.command.spawn: true
      toomuchzombies.command.info: true
      toomuchzombies.command.killall: true
      toomuchzombies.command.bloodmoon: true
      toomuchzombies.command.chaos: true
      toomuchzombies.command.reload: true
      toomuchzombies.command.level: true
  toomuchzombies.command.spawn:
    description: 允许使用 /za spawn 命令
    default: op
  toomuchzombies.command.info:
    description: 允许使用 /za info 命令
    default: op
  toomuchzombies.command.killall:
    description: 允许使用 /za killall 命令
    default: op
  toomuchzombies.command.bloodmoon:
    description: 允许使用 /za forcebloodmoon 命令
    default: op
  toomuchzombies.command.chaos:
    description: 允许使用 /za forcechaos 命令
    default: op
  toomuchzombies.command.reload:
    description: 允许使用 /za reload 命令
    default: op
  toomuchzombies.command.level:
    description: 允许使用 /za level 命令
    default: op
